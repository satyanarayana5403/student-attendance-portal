services:
  - type: web
    name: student-attendance-portal
    env: python
    plan: free
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
