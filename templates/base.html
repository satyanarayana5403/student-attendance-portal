<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus Attendance Portal — Smart student and teacher attendance management system">
    <title>{% block title %}Nexus Attendance{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        {% block extra_css %}{% endblock %}
    </style>
    <script>
        // Apply theme early to prevent flicker
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body {% block body_attrs %}{% endblock %}>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <div id="page-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">{% block loader_text %}Loading...{% endblock %}</div>
    </div>

    {% block body %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
